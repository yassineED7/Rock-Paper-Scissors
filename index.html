<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <script src="script.js" defer></script>


</head>
<body>
    <div>
        <h1>Rock Paper Scissors</h1>
    
    <div class="choices">
        <button class="choice-btn" id="rock">Rock</button>
        <button class="choice-btn" id="paper">Paper</button>
        <button class="choice-btn" id="scissors">Scissors</button>
    </div>

    <div id="result">
        <p id="round-outcome">Choose your weapon to start the game!</p>
        <p id="score-board">Player: 0 | Computer: 0</p>
    </div>
    </div>
</body>
</html>
